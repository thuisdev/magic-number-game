<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Number Game</title>
    <link rel="stylesheet" href="index.css">

</head>
<body>
    <h1>Magic Number Game</h1>
    <div id="MagicN">
        <div id="btn">
            <input 
                id="input-nm" 
                type="number" 
                placeholder="1-10"
                min ="1"
                max ="10">

            <button id="btn-guess">Guess</button>
            <button id="btn-reset">Reset</button>
        </div>
        <div id="counter">
        </div>

        <p id="high">Too high</p>
        <p id="low">Too low</p>
        <p id="congrats">Congrats, you got the right number!</p>
    </div>

    <script src="index.js"></script>
</body>
</html>
